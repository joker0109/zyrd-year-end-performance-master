server:
  port: 8080

spring:
  # 仅禁用 Spring Security（不需要，由自定义 AuthInterceptor 负责鉴权）
  # Redis 已启用，连接本地 localhost:6379
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration
      - org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

  # MySQL 数据库（本地）
  datasource:
    url: jdbc:mysql://localhost:3306/performance_evaluation?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: "root123456"
    driver-class-name: com.mysql.cj.jdbc.Driver

  # 禁用启动时执行补丁SQL（db-migrate.sql含MySQL 8.0+语法，与5.7不兼容）
  sql:
    init:
      mode: never

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath*:/mapper/**/*.xml
